<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>I-Metro - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#dde2f3",
                        "on-tertiary-container": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3af",
                        "on-primary-fixed": "#002113",
                        "on-primary": "#ffffff",
                        "secondary-container": "#dde2f3",
                        "surface-container": "#eceef0",
                        "on-tertiary": "#ffffff",
                        "outline": "#6e7a71",
                        "on-surface-variant": "#3e4942",
                        "primary-container": "#00875a",
                        "on-tertiary-fixed": "#410005",
                        "surface-tint": "#006c47",
                        "surface-dim": "#d8dadc",
                        "primary-fixed": "#8df7c1",
                        "surface-variant": "#e0e3e5",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#5e6473",
                        "inverse-primary": "#71dba6",
                        "on-primary-fixed-variant": "#005235",
                        "outline-variant": "#bdcac0",
                        "surface-container-highest": "#e0e3e5",
                        "on-background": "#191c1e",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffdad7",
                        "on-tertiary-fixed-variant": "#7d2a2a",
                        "tertiary-container": "#ba5855",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "background": "#f7f9fb",
                        "inverse-on-surface": "#eff1f3",
                        "secondary": "#585e6c",
                        "primary-fixed-dim": "#71dba6",
                        "surface-container-high": "#e6e8ea",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary-fixed": "#161c27",
                        "on-surface": "#191c1e",
                        "tertiary": "#9b403e",
                        "primary": "#006b47",
                        "on-secondary-fixed-variant": "#414754",
                        "surface": "#f7f9fb",
                        "error": "#ba1a1a",
                        "on-primary-container": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed-dim": "#c1c6d7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #006b47 0%, #00875a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-background min-h-screen flex items-center justify-center p-6">
<!-- Auth Shell Suppression: No TopAppBar or BottomNavBar as per transactional rule -->
<main class="w-full max-w-md">
<!-- Brand Identity Section -->
<div class="mb-12 text-left md:pl-8">
<div class="flex items-center gap-2 mb-6">
<div class="w-10 h-10 kinetic-gradient rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary" data-icon="directions_subway">directions_subway</span>
</div>
<h1 class="font-headline font-extrabold text-2xl tracking-tight text-primary">I-Metro</h1>
</div>
<h2 class="font-headline font-bold text-3xl text-on-surface mb-2">The Kinetic Sanctuary</h2>
<p class="font-body text-on-surface-variant leading-relaxed">Sign in to resume your seamless urban journey.</p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest rounded-[1.5rem] p-8 shadow-[0_8px_40px_rgba(0,0,0,0.04)] relative overflow-hidden">
<!-- Subtle Tonal Background Shift (Design System: No-Line Rule) -->
<form action="#" class="space-y-6">
<!-- Email/Phone Input -->
<div class="space-y-2">
<label class="font-label font-semibold text-xs uppercase tracking-widest text-on-surface-variant pl-1" for="email">Email/phone</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="alternate_email">alternate_email</span>
<input class="w-full h-14 bg-surface-container-low border-0 rounded-xl pl-12 pr-4 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" name="email" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label font-semibold text-xs uppercase tracking-widest text-on-surface-variant" for="password">password</label>
<a class="font-label font-medium text-xs text-primary hover:opacity-80 transition-opacity" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="lock">lock</span>
<input class="w-full h-14 bg-surface-container-low border-0 rounded-xl pl-12 pr-12 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 kinetic-gradient text-on-primary font-headline font-bold text-lg rounded-xl shadow-xl shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social Login / Alternative -->
<div class="mt-10 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
<span class="font-label text-xs text-outline uppercase tracking-tighter">Secure connection</span>
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
</div>
</div>
<!-- Footer Links -->
<div class="mt-10 text-center space-y-4">
<p class="font-body text-on-surface-variant text-sm">
                Don't have an account? 
                <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-primary/30 transition-all" href="#">Create account</a>
</p>
<div class="flex justify-center gap-6 opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all duration-500 pt-4">
<span class="material-symbols-outlined text-2xl" data-icon="nfc">nfc</span>
<span class="material-symbols-outlined text-2xl" data-icon="contactless">contactless</span>
<span class="material-symbols-outlined text-2xl" data-icon="qr_code_2">qr_code_2</span>
</div>
</div>
</main>
<!-- Visual Element: Abstract Shape for Background (Kinetic Sanctuary Theme) -->
<div class="fixed top-[-10%] right-[-5%] w-[40vw] h-[40vw] kinetic-gradient opacity-[0.03] rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[30vw] h-[30vw] kinetic-gradient opacity-[0.03] rounded-full blur-[80px] pointer-events-none -z-10"></div>
<!-- Background Illustration Overlay -->
<div class="fixed inset-0 pointer-events-none -z-20 overflow-hidden opacity-5">
<img alt="" class="absolute bottom-0 right-0 w-3/4 object-cover" data-alt="Modern minimalist architectural lines of a futuristic metro station with soft natural light and clean white surfaces" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlBBL7EPeNcZ65YjWuBpi78zDK89-0fQIe4FIXs_X5FuVNzJTvjTzoZ0QqE3w_D33zx7qvJi0FRbeiv7Zmwj79BrxqMDOIlzzHZ9FJ5-4gKM5nhgKmT2Klsevo2GN6kCZP5YUCpWd_MkMvDsIe8U2rVhcyJjYBjjqVUjUYjHvbyTfl4Ckrwi-EopHMDcbV4astU_SDxCs5eSdLls9LB16cmxyEuG4Py1n-QFcy8VOLzgo2UQVCkAApUoWG9skRa5n8ezMnbVxMLQ"/>
</div>
</body></html>

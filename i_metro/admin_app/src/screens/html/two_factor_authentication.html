
<!-- Kinetic Background Accents -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-3xl translate-x-1/4 translate-y-1/4"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-lg">
<!-- Verification Card -->
<div class="surface-container-lowest glass-panel rounded-xl shadow-2xl overflow-hidden flex flex-col items-center text-center p-8 md:p-12 border border-white/40">
<!-- Brand Anchor -->
<div class="mb-10 flex flex-col items-center">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center shadow-lg mb-4">
<span class="material-symbols-outlined text-white text-4xl" data-icon="shield_person">shield_person</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-primary">I-Metro</h1>
<p class="font-label text-on-surface-variant text-xs uppercase tracking-[0.1em] mt-1">I-Metro Security</p>
</div>
<!-- Context Messaging -->
<div class="space-y-3 mb-10">
<h2 class="font-headline font-semibold text-2xl text-on-surface">Two-Factor Authentication</h2>
<p class="text-on-surface-variant max-w-xs mx-auto text-sm leading-relaxed">
                    We've sent a 6-digit verification code to <span class="font-semibold text-on-surface">ad***@i-metro.com</span>. Enter the code below to secure your session.
                </p>
</div>
<!-- OTP Input Section -->
<div class="w-full mb-8">
<div class="flex justify-between gap-3 md:gap-4 mb-6">
<input class="otp-input w-12 h-16 md:w-14 md:h-20 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest focus:bg-surface-container-lowest transition-all text-primary" maxlength="1" placeholder="0" type="text"/>
<input class="otp-input w-12 h-16 md:w-14 md:h-20 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest focus:bg-surface-container-lowest transition-all text-primary" maxlength="1" placeholder="0" type="text"/>
<input class="otp-input w-12 h-16 md:w-14 md:h-20 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest focus:bg-surface-container-lowest transition-all text-primary" maxlength="1" placeholder="0" type="text"/>
<input class="otp-input w-12 h-16 md:w-14 md:h-20 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest focus:bg-surface-container-lowest transition-all text-primary" maxlength="1" placeholder="0" type="text"/>
<input class="otp-input w-12 h-16 md:w-14 md:h-20 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest focus:bg-surface-container-lowest transition-all text-primary" maxlength="1" placeholder="0" type="text"/>
<input class="otp-input w-12 h-16 md:w-14 md:h-20 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest focus:bg-surface-container-lowest transition-all text-primary" maxlength="1" placeholder="0" type="text"/>
</div>
<!-- Feedback/Status -->
<div class="flex items-center justify-center gap-2 text-on-surface-variant text-xs mb-4">
<span class="material-symbols-outlined text-sm" data-icon="schedule">schedule</span>
<span>Code expires in <span class="font-semibold text-primary">04:59</span></span>
</div>
</div>
<!-- Action Cluster -->
<div class="w-full space-y-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold rounded-lg shadow-md hover:shadow-xl transition-all active:scale-[0.98] duration-150">
                    Verify Account
                </button>
<div class="pt-4 flex flex-col items-center gap-3">
<p class="text-sm text-on-surface-variant">Didn't receive the code?</p>
<button class="text-primary font-semibold text-sm hover:underline decoration-2 underline-offset-4 transition-all">
                        Resend Code
                    </button>
</div>
</div>
<!-- Security Footer -->
<div class="mt-12 pt-8 w-full border-t border-surface-container-high/50 flex items-center justify-center gap-6">
<div class="flex items-center gap-2 grayscale opacity-60">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-label font-medium uppercase tracking-widest">Secure TLS 1.3</span>
</div>
<div class="flex items-center gap-2 grayscale opacity-60">
<span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
<span class="text-[10px] font-label font-medium uppercase tracking-widest">AES-256 Encrypted</span>
</div>
</div>
</div>
<!-- Back Navigation -->
<div class="mt-8 flex justify-center">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors duration-200">
<span class="material-symbols-outlined text-lg" data-icon="arrow_back">arrow_back</span>
<span class="font-medium text-sm">Return to Login</span>
</button>
</div>
</main>

<div class="fixed bottom-8 right-8">

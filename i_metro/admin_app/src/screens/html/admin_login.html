
<!-- Subtle Background Layering -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-fixed opacity-10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[5%] -right-[5%] w-[30%] h-[30%] bg-secondary-container opacity-20 rounded-full blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[480px]">
<div class="surface-container-low bg-surface-container-low p-1 rounded-xl">
<div class="no-line-card rounded-lg p-8 md:p-12 shadow-[0px_10px_30px_rgba(25,28,29,0.05)]">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 kinetic-gradient flex items-center justify-center rounded-lg mb-4 text-white">
<img src="/brand/imetro_logo.png" alt="I-Metro logo" class="h-full w-full object-contain block" />
</div>
<h1 class="editorial-headline text-2xl font-extrabold tracking-tight text-primary">
                        I-Metro
                    </h1>
<p class="text-on-surface-variant font-medium mt-1">I-Metro Bus Admin</p>
</div>
<!-- Welcome Text -->
<div class="mb-8 text-center md:text-left">
<h2 class="editorial-headline text-3xl font-bold text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant mt-2 text-sm">Please enter your credentials to access the command center.</p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-[0.05em] text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="absolute inset-y-0 left-4 flex items-center text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</span>
<input class="w-full bg-surface-container-highest border-transparent rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" id="email" placeholder="Admin email address" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold uppercase tracking-[0.05em] text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="absolute inset-y-0 left-4 flex items-center text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</span>
<input class="w-full bg-surface-container-highest border-transparent rounded-lg py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" id="password" placeholder="" required="" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Stay Signed In -->
<div class="flex items-center space-x-3 px-1">
<div class="relative flex items-center h-5">
<input class="w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-highest" id="remember" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant" for="remember">Keep me logged in for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full kinetic-gradient text-on-primary font-semibold py-4 rounded-lg shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                        Sign in
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Meta -->
<div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-xs text-on-surface-variant leading-relaxed">
                        Authorized personnel only. Access is monitored and logged. 
                        By signing in, you agree to the <a class="underline hover:text-primary" href="#">Operational Guidelines</a>.
                    </p>
</div>
</div>
</div>
<!-- Decorative Element: Asymmetric Layout Detail -->
<div class="mt-8 flex justify-between items-center text-on-surface-variant text-xs font-medium px-4 opacity-60">
<div class="flex items-center gap-4">
<span>SYSTEM v4.2.1</span>
<span>SECURE NODE 09</span>
</div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-fixed-dim"></span>
<span>ALL SYSTEMS NOMINAL</span>
</div>
</div>
</main>
<!-- Side Decoration (Visual Weight Balance) -->
<div class="hidden xl:block fixed top-1/2 -right-24 -translate-y-1/2 w-64 h-64 border-[40px] border-surface-container-highest/50 rounded-full"></div>
<div class="hidden xl:block fixed top-[15%] right-[10%] opacity-20 pointer-events-none">
<div class="w-32 h-32 no-line-card rounded-xl p-4 flex flex-col justify-between">
<div class="w-8 h-8 rounded bg-surface-container-high"></div>
<div class="space-y-2">
<div class="h-2 w-full bg-surface-container-high rounded-full"></div>
<div class="h-2 w-2/3 bg-surface-container-high rounded-full"></div>
</div>
</div>
</div>
